# ==============================================================================
# nginx Configuration — OSKADUSI
# Hack Club Nest Deployment
#
# Place this file at:
#   /etc/nginx/sites-available/oskadusi
#
# Then enable it:
#   sudo ln -s /etc/nginx/sites-available/oskadusi /etc/nginx/sites-enabled/
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace YOUR_USERNAME with your Hack Club Nest username.
# Your site will be live at: https://YOUR_USERNAME.hackclub.app
# ==============================================================================

server {
    listen 80;
    listen [::]:80;

    server_name YOUR_USERNAME.hackclub.app;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name YOUR_USERNAME.hackclub.app;

    # ── SSL (Hack Club Nest manages certs via Caddy/nginx — adjust paths as needed)
    # If Hack Club Nest uses Caddy, you may not need this nginx config at all.
    # Check their docs: https://hackclub.com/nest/
    # ssl_certificate     /etc/letsencrypt/live/YOUR_USERNAME.hackclub.app/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_USERNAME.hackclub.app/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ────────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"            always;
    add_header X-Content-Type-Options  "nosniff"               always;
    add_header X-XSS-Protection        "1; mode=block"         always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "camera=(), microphone=(), geolocation=()" always;

    # ── Logging ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/oskadusi_access.log;
    error_log  /var/log/nginx/oskadusi_error.log warn;

    # ── Gzip Compression ────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Client Settings ─────────────────────────────────────────────────────────
    client_max_body_size  10M;
    keepalive_timeout     65;

    # ── Upstream: Express Backend ────────────────────────────────────────────────
    # All /api/* requests are proxied to the Node.js backend (PM2-managed)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_read_timeout    90s;
        proxy_connect_timeout 90s;
        proxy_send_timeout    90s;

        # Disable buffering for real-time responses
        proxy_buffering off;

        # Error handling
        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }

    # ── Static Assets (served by Express from dist/) ────────────────────────────
    # For maximum performance, you can serve static files directly from nginx
    # by pointing root to the built frontend dist directory.
    # Uncomment the block below and adjust the path if you prefer nginx to serve
    # static files directly instead of passing them through Express.

    # location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
    #     root /home/YOUR_USERNAME/oskadusi/dist;
    #     expires 1y;
    #     add_header Cache-Control "public, immutable";
    #     access_log off;
    #     try_files $uri =404;
    # }

    # ── SPA Fallback: Everything else → Express → React Router ──────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    90s;
        proxy_connect_timeout 90s;

        proxy_intercept_errors on;
        error_page 502 503 504 = @backend_error;
    }

    # ── Backend Offline Error Page ───────────────────────────────────────────────
    location @backend_error {
        default_type text/html;
        return 503 '<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OSKADUSI — Maintenance</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      color: #fff;
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; }
    p  { color: rgba(255,255,255,0.4); font-size: 0.9rem; line-height: 1.6; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #ea0000;
      margin: 0 auto 1.5rem;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 1;   transform: scale(1.25); }
    }
  </style>
</head>
<body>
  <div class="dot"></div>
  <h1>Sedang Maintenance</h1>
  <p>Website OSKADUSI sedang dalam pemeliharaan.<br>Silakan coba lagi dalam beberapa menit.</p>
</body>
</html>';
    }
}
